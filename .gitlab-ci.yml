image: node

stages:
  - test
  - package
  - deploy

# test:
#     stage: test
#     before_script:
#         - yarn install
#     script:
#         - yarn test:e2e

vulnerabilities check:
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: push
    paths:
      - ./node_modules
  script:
    - yarn install
    - yarn scan

build hermod:
  stage: package
  cache:
    key: site-package
    policy: push
    paths:
      - ./dist
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
    paths:
      - ./node_modules
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_NAME"
    when: always
    expire_in: 2h20min
    paths:
      - ./dist
  script:
    - yarn install
    - yarn build

deploy to develop:
  stage: deploy
  variables:
    CNAME: develop-hermod.surge.sh
    GIT_STRATEGY: none
  cache:
    key: site-package
    policy: pull
    paths:
      - ./dist
  before_script:
    - yarn global add surge
  script:
    - surge --project ./dist --domain ${CNAME}
  after_script:
    - whoami
  environment:
    name: develop
    url: http://${CNAME}
  only:
    - develop

deploy to release:
  stage: deploy
  variables:
    CNAME: $CI_COMMIT_REF_SLUG.hermod.surge.sh
    GIT_STRATEGY: none
  cache:
    key: site-package
    policy: pull
    paths:
      - ./dist
  before_script:
    - yarn global add surge
  script:
    - surge --project ./dist --domain ${CNAME}
  after_script:
    - whoami
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: http://${CNAME}
    on_stop: turnoff
  only:
    - /^release-.*$/

turnoff:
  stage: deploy
  variables:
    CNAME: $CI_COMMIT_REF_SLUG.hermod.surge.sh
    GIT_STRATEGY: none
  before_script:
    - yarn global add surge
  script:
    - surge teardown ${CNAME}
  when: manual
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: http://${CNAME}
    action: stop
  only:
    - /^release-.*$/

deploy to production:
  stage: deploy
  variables:
    CNAME: hermod.surge.sh
    GIT_STRATEGY: none
  cache:
    key: site-package
    policy: pull
    paths:
      - ./dist
  before_script:
    - yarn global add surge
  script:
    - surge --project ./dist --domain ${CNAME}
  after_script:
    - whoami
  environment:
    name: production
    url: http://${CNAME}
  only:
    - master
