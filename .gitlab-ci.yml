deploy to production:
  image: amazonlinux
  stage: deploy
  variables:
    S3_BUCKET: s3://hermod.s3-website-sa-east-1.amazonaws.com
    GIT_STRATEGY: none
  cache:
    key: site-package
    policy: pull
    paths:
      - ./dist
  before_script:
    - curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py && python get-pip.py
    - pip install awscli --upgrade --user && export PATH=/.local/bin:$PATH
    - aws --version
  script:
    - aws s3 ls ${S3_BUCKET}
    - cd dist && pwd && ls -ltra
    - aws s3 rm ${S3_BUCKET}/ --recursive
    - aws s3 cp . ${S3_BUCKET} --acl public-read --recursive
  environment:
    name: production
    url: http://hermod.s3-website-sa-east-1.amazonaws.com
  only:
    - master
