build hermod: &build
  stage: package
  cache:
    key: site-package
    policy: push
    paths:
      - ./dist
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
    paths:
      - ./node_modules
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_NAME"
    when: always
    expire_in: 2h20min
    paths:
      - ./dist
  script:
    - yarn build

